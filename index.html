<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFS AI — Client Proposals</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060B14;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 20%, rgba(37,99,235,0.07) 0%, transparent 60%);
    pointer-events: none;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: #38BDF8;
    letter-spacing: -1px;
    margin-bottom: 8px;
    text-align: center;
  }
  .sub {
    font-size: 13px;
    color: #4A5A78;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 60px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 1px;
    width: 100%;
    max-width: 600px;
    background: #0A1520;
    border: 1px solid #0A1520;
  }
  .card {
    background: #0A1020;
    padding: 32px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    transition: background 0.2s;
  }
  .card:hover { background: #0F1828; }
  .card-left { display: flex; align-items: center; gap: 18px; }
  .card-icon { font-size: 28px; }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #F0F4FF;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .card-desc { font-size: 12px; color: #4A5A78; }
  .arrow { color: #38BDF8; font-size: 18px; }
  .footer { margin-top: 40px; font-size: 12px; color: #1E2A3A; text-align: center; }
</style>
</head>
<body>
  <div class="logo">BFS AI</div>
  <div class="sub">Client Proposals · Calgary</div>
  <div class="cards">
    <a class="card" href="sagehill.html">
      <div class="card-left">
        <div class="card-icon">📣</div>
        <div>
          <div class="card-title">Sage Hill Bottle Depot</div>
          <div class="card-desc">Marketing & AI Package · $1,200/mo</div>
        </div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="card" href="atm-app.html">
      <div class="card-left">
        <div class="card-icon">💵</div>
        <div>
          <div class="card-title">ATM Reconciliation App</div>
          <div class="card-desc">Cash Management Software · $2,500–$3,000</div>
        </div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="card" href="flourmill.html">
      <div class="card-left">
        <div class="card-icon">🌾</div>
        <div>
          <div class="card-title">Flour Mill ERP</div>
          <div class="card-desc">Custom Business Software · $5,000–$6,000</div>
        </div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
  <div class="footer">Prepared by BFS AI · Calgary, Alberta</div>
</body>
</html>
